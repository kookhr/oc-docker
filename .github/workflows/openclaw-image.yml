name: build-openclaw-image

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

concurrency:
  group: build-openclaw-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve upstream base image
        id: upstream
        run: |
          upstream_repo=ghcr.io/openclaw/openclaw
          upstream_image="${upstream_repo}:latest"
          digest=""
          while IFS= read -r line; do
            case "$line" in
              Digest:*)
                digest="${line#Digest:}"
                digest="${digest#"${digest%%[![:space:]]*}"}"
                digest="${digest%"${digest##*[![:space:]]}"}"
                break
                ;;
            esac
          done < <(docker buildx imagetools inspect "$upstream_image")

          if [ -z "$digest" ]; then
            echo "Failed to resolve digest for $upstream_image" >&2
            exit 1
          fi

          {
            echo "base_image=${upstream_repo}@${digest}"
            echo "digest=${digest}"
            echo "digest_tag=${digest#sha256:}"
          } >> "$GITHUB_OUTPUT"

      - name: Normalize repository owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Check current published image state
        id: state
        run: |
          image="ghcr.io/${{ steps.owner.outputs.value }}/openclaw:latest"
          pull_output="$(docker pull "$image" 2>&1)" || pull_rc=$?
          pull_rc="${pull_rc:-0}"

          if [ "$pull_rc" -eq 0 ]; then
            current_base_digest="$(docker image inspect "$image" --format '{{ index .Config.Labels "org.opencontainers.image.base.digest" }}')"
            if [ -z "$current_base_digest" ] || [ "$current_base_digest" = "<no value>" ]; then
              echo "Missing label org.opencontainers.image.base.digest on $image" >&2
              exit 1
            fi

            if [ "$current_base_digest" = "${{ steps.upstream.outputs.digest }}" ]; then
              echo "needs_build=false" >> "$GITHUB_OUTPUT"
            else
              echo "needs_build=true" >> "$GITHUB_OUTPUT"
            fi
          elif echo "$pull_output" | grep -qiE 'not found|manifest unknown|name unknown'; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "Failed to pull current image: $image" >&2
            echo "$pull_output" >&2
            exit "$pull_rc"
          fi

      - name: Build metadata
        id: meta
        if: github.event_name != 'schedule' || steps.state.outputs.needs_build == 'true'
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/openclaw
          tags: |
            type=raw,value=latest
          labels: |
            org.opencontainers.image.base.name=${{ steps.upstream.outputs.base_image }}
            org.opencontainers.image.base.digest=${{ steps.upstream.outputs.digest }}

      - name: Build and push
        if: github.event_name != 'schedule' || steps.state.outputs.needs_build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENCLAW_BASE=${{ steps.upstream.outputs.base_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
